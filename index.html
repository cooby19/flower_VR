<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f0c" />
    <title>校園金針花 360 度互動場景</title>
  </head>
  <body>
    <main id="app" aria-label="校園金針花 360 度互動場景">
      <canvas id="scene" aria-label="雨後校園金針花 360 度全景"></canvas>

      <div id="loading" class="loading" role="status">載入校園全景中</div>
      <div class="crosshair" aria-hidden="true"></div>

      <a id="backToMap" class="back-button" href="https://mobing14.github.io/flower-campus-map/">← 返回地圖</a>
      <button id="gyroButton" class="gyro-button" type="button">啟用陀螺儀</button>
      <button id="interactionPrompt" class="interaction-prompt is-hidden" type="button" aria-label="檢視金針花" hidden>
        <span id="promptKey" class="prompt-key" aria-hidden="true">F</span>
        <span id="promptAction">檢視</span>
      </button>

      <section
        id="dialogueOverlay"
        class="dialogue-overlay is-hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dialogueSpeaker"
        hidden
        tabindex="-1"
      >
        <div class="dialogue-panel">
          <div id="dialogueSpeaker" class="dialogue-speaker">解說員</div>
          <p id="dialogueText" class="dialogue-text"></p>
          <button id="dialogueAdvance" class="dialogue-advance" type="button">下一句</button>
        </div>
      </section>

      <div class="hud" role="status" aria-live="polite">
        <span id="hudText">拖曳或轉動手機觀看四周</span>
        <span id="statusText" class="status-text"></span>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
